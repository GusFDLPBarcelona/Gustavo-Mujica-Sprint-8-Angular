<div class="map-layout">
    <div id="mapbox"></div>
    <div class="map-sidebar">
            <h3>Ubicaciones</h3>
            <div id="locations">
                <ul id="location-list" style="list-style-type: none; padding: 0;">
                    @for (marker of markers; track marker) {
                    <li class="marker-item">
                        <button class="marker-nav-btn" (click)="goToLocation(marker.latitude, marker.longitude)">
                            <strong>{{ marker.name || 'Nuevo marcador' }}</strong><br />
                            <span class="coordinates">[Lat: {{ marker.latitude }}, Lng: {{ marker.longitude }}]</span>
                        </button>
                        @if (marker.id) {
                        <button class="delete-marker-btn" (click)="eliminarMarcador(marker)">✕</button>
                        }
                    </li>
                    }
                </ul>
            </div>
        </div>
    </div>
